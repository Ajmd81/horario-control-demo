spring.application.name=control-horario-lite

# ── Base de datos ──────────────────────────────────────────────────────────────
# Railway inyecta JDBC_DATABASE_URL automaticamente.
# En local usa H2 si no hay variable de entorno.
spring.datasource.url=${JDBC_DATABASE_URL:jdbc:h2:mem:litedb;DB_CLOSE_DELAY=-1}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASS:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=${DB_DIALECT:org.hibernate.dialect.H2Dialect}

# ── JWT ────────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:dev-secret-change-in-production-min-32-chars}
jwt.expiration-ms=86400000

# ── CORS ───────────────────────────────────────────────────────────────────────
allowed.origins=${ALLOWED_ORIGINS:http://localhost:5173}

# ── H2 Console (solo desarrollo) ───────────────────────────────────────────────
spring.h2.console.enabled=true
