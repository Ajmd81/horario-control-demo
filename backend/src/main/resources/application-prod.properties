spring.datasource.url=${JDBC_DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:}

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=false

logging.level.org.springframework.security=DEBUG
server.error.whitelabel.enabled=false
spring.web.resources.add-mappings=false
logging.level.com.controlhorario=DEBUG
logging.level.org.springframework.web=DEBUG

server.error.include-message=always
server.error.include-binding-errors=always

# Stripe
stripe.secret-key=${STRIPE_SECRET_KEY}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}
stripe.price.basico=${STRIPE_PRICE_BASICO}
stripe.price.profesional=${STRIPE_PRICE_PROFESIONAL}
stripe.price.ultimate=${STRIPE_PRICE_ULTIMATE}

# URL base para redirects de Stripe success/cancel
app.base-url=${APP_BASE_URL:https://fichajelaboral-landing.vercel.app}